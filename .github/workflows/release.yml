name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-x86_64
          - os: macos-latest
            suffix: macos-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libopenmpi-dev openmpi-bin \
            libomp-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install llvm libomp open-mpi
          LLVM_PREFIX="$(brew --prefix llvm)"
          LIBOMP_PREFIX="$(brew --prefix libomp)"
          echo "CC=${LLVM_PREFIX}/bin/clang"           >> $GITHUB_ENV
          echo "CXX=${LLVM_PREFIX}/bin/clang++"        >> $GITHUB_ENV
          echo "LDFLAGS=-L${LIBOMP_PREFIX}/lib"         >> $GITHUB_ENV
          echo "CPPFLAGS=-I${LIBOMP_PREFIX}/include"    >> $GITHUB_ENV
          echo "OpenMP_ROOT=${LIBOMP_PREFIX}"           >> $GITHUB_ENV

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure CMake (macOS)
        if: runner.os == 'macOS'
        run: |
          LLVM_PREFIX="$(brew --prefix llvm)"
          LIBOMP_PREFIX="$(brew --prefix libomp)"
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER="${LLVM_PREFIX}/bin/clang" \
            -DCMAKE_CXX_COMPILER="${LLVM_PREFIX}/bin/clang++" \
            -DCMAKE_EXE_LINKER_FLAGS="-L${LIBOMP_PREFIX}/lib"

      - name: Build
        run: cmake --build build --config Release --parallel

      - name: Rename binaries
        run: |
          cp aligner      aligner-${{ matrix.suffix }}
          cp fmindex      fmindex-${{ matrix.suffix }}
          cp seed_aligner seed_aligner-${{ matrix.suffix }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: |
            aligner-${{ matrix.suffix }}
            fmindex-${{ matrix.suffix }}
            seed_aligner-${{ matrix.suffix }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Attach binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true