name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-x86_64
          - os: macos-latest
            suffix: macos-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libopenmpi-dev openmpi-bin \
            libomp-dev \
            libdivsufsort-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install open-mpi libomp libdivsufsort
          echo "OpenMP_ROOT=$(brew --prefix libomp)" >> $GITHUB_ENV

      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release



      - name: Build
        run: cmake --build build --config Release --parallel

      # Binaries land in CMAKE_SOURCE_DIR per your CMakeLists.txt
      - name: Rename binaries
        run: |
          cp aligner      aligner-${{ matrix.suffix }}
          cp fmindex      fmindex-${{ matrix.suffix }}
          cp seed_aligner seed_aligner-${{ matrix.suffix }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.suffix }}
          path: |
            aligner-${{ matrix.suffix }}
            fmindex-${{ matrix.suffix }}
            seed_aligner-${{ matrix.suffix }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Attach binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true