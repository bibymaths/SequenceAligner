name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: aligner-linux-x86_64
            cmake_extra: ""
          - os: macos-latest
            artifact: aligner-macos-arm64
            cmake_extra: ""
          - os: windows-latest
            artifact: aligner-windows-x86_64.exe
            cmake_extra: "-G Ninja"

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Dependencies ──────────────────────────────────────────────────────
      - name: Install MPI (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libopenmpi-dev openmpi-bin ninja-build

      - name: Install MPI (macOS)
        if: runner.os == 'macOS'
        run: brew install open-mpi ninja

      - name: Install MPI (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install msmpi ninja --no-progress -y
          echo "MSMPI_INC=C:\Program Files (x86)\Microsoft SDKs\MPI\Include" >> $env:GITHUB_ENV
          echo "MSMPI_LIB64=C:\Program Files (x86)\Microsoft SDKs\MPI\Lib\x64" >> $env:GITHUB_ENV

      # ── Configure & Build ─────────────────────────────────────────────────
      - name: Configure CMake
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=Release
          ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build --config Release --parallel

      # ── Rename binary ─────────────────────────────────────────────────────
      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          BIN=$(find build -maxdepth 2 -type f -perm /111 ! -name "*.cmake" | head -1)
          cp "$BIN" "${{ matrix.artifact }}"

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = Get-ChildItem -Path build -Recurse -Filter "*.exe" | Select-Object -First 1
          Copy-Item $bin.FullName "${{ matrix.artifact }}"

      # ── Upload artifact ───────────────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── Attach all binaries to GitHub Release ──────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Attach binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: trues