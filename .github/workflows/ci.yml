name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: aligner-linux-x86_64

          - os: macos-latest
            artifact: aligner-macos-arm64

          - os: windows-latest
            artifact: aligner-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Linux dependencies ─────────────────────────────────────────────
      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libopenmpi-dev openmpi-bin \
            libomp-dev \
            libdivsufsort-dev

      # ── macOS dependencies ─────────────────────────────────────────────
      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install open-mpi libomp divsufsort
          # Expose libomp paths for CMake
          echo "LDFLAGS=-L$(brew --prefix libomp)/lib" >> $GITHUB_ENV
          echo "CPPFLAGS=-I$(brew --prefix libomp)/include" >> $GITHUB_ENV
          echo "OpenMP_ROOT=$(brew --prefix libomp)" >> $GITHUB_ENV

      # ── Windows dependencies ───────────────────────────────────────────
      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # MS-MPI: download directly from Microsoft
          Invoke-WebRequest -Uri "https://github.com/microsoft/Microsoft-MPI/releases/download/v10.1.3/msmpisetup.exe" -OutFile msmpisetup.exe
          Start-Process -FilePath msmpisetup.exe -ArgumentList "/unattend" -Wait
          Invoke-WebRequest -Uri "https://github.com/microsoft/Microsoft-MPI/releases/download/v10.1.3/msmpisdk.msi" -OutFile msmpisdk.msi
          Start-Process msiexec.exe -ArgumentList "/i msmpisdk.msi /quiet" -Wait
          # divsufsort: build from source
          git clone https://github.com/y-256/libdivsufsort.git
          cmake -S libdivsufsort -B libdivsufsort/build -DCMAKE_BUILD_TYPE=Release -DBUILD_DIVSUFSORT64=ON
          cmake --build libdivsufsort/build --config Release
          cmake --install libdivsufsort/build --prefix C:/divsufsort
          echo "CMAKE_PREFIX_PATH=C:/divsufsort" >> $env:GITHUB_ENV

      # ── Configure ─────────────────────────────────────────────────────
      - name: Configure CMake (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Configure CMake (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DOpenMP_C_FLAGS="-Xpreprocessor -fopenmp" \
            -DOpenMP_CXX_FLAGS="-Xpreprocessor -fopenmp" \
            -DOpenMP_C_LIB_NAMES="omp" \
            -DOpenMP_CXX_LIB_NAMES="omp" \
            -DOpenMP_omp_LIBRARY="$(brew --prefix libomp)/lib/libomp.dylib"

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S . -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_PREFIX_PATH="C:/divsufsort"

      # ── Build ──────────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build --config Release --parallel

      # ── Collect & rename binary ────────────────────────────────────────
      - name: Rename binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cp aligner ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item build/Release/aligner.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Attach binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true